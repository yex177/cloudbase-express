<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信小程序后台管理系统</title>
  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
    }
    .login-card {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 400px;
    }
    .login-title {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #666;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #409EFF;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #66b1ff;
    }
    button:disabled {
      background-color: #c0c4cc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // 简化版Vue应用
    const { createApp, ref } = Vue;

    // 登录组件
    const LoginComponent = {
      template: `
        <div class="login-container">
          <div class="login-card">
            <h2 class="login-title">微信小程序后台管理系统</h2>
            <form @submit.prevent="handleLogin">
              <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" v-model="loginForm.username" placeholder="请输入用户名">
              </div>
              <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" v-model="loginForm.password" placeholder="请输入密码">
              </div>
              <button type="submit" :disabled="loading">登录</button>
            </form>
          </div>
        </div>
      `,
      setup() {
        const loginForm = {
          username: '',
          password: ''
        };
        const loading = ref(false);

        const handleLogin = async () => {
          loading.value = true;
          try {
            // 模拟登录请求
            console.log('登录请求:', loginForm);
            // 模拟登录成功
            setTimeout(() => {
              alert('登录成功');
              loading.value = false;
            }, 1000);
          } catch (error) {
            console.error('登录失败:', error);
            loading.value = false;
          }
        };

        return { loginForm, loading, handleLogin };
      }
    };

    // 主应用
    const App = {
      template: `
        <div>
          <LoginComponent />
        </div>
      `,
      components: { LoginComponent }
    };

    const app = createApp(App);
    app.mount('#app');

    console.log('Vue 应用初始化成功');
  </script>
</body>
</html>
