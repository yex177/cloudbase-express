<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信小程序后台管理系统</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 0;
    }
    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .app-header {
      background-color: #409EFF;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .app-title {
      font-size: 18px;
      font-weight: bold;
    }
    .app-main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 400px;
    }
    .login-title {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #666;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #409EFF;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #66b1ff;
    }
    button:disabled {
      background-color: #c0c4cc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <div class="app-title">微信小程序后台管理系统</div>
    </div>
    <div class="app-main">
      <div class="login-container">
        <h2 class="login-title">微信小程序后台管理系统</h2>
        <div id="error-message" style="color: red; margin-bottom: 20px; display: none;"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
          </div>
          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码">
          </div>
          <button type="submit" id="loginButton">登录</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    // 全局日志函数
    function log(message) {
      console.log('登录系统:', message);
    }

    document.addEventListener('DOMContentLoaded', function() {
      log('DOM加载完成');
      
      const loginForm = document.getElementById('loginForm');
      const loginButton = document.getElementById('loginButton');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const errorMessage = document.getElementById('error-message');

      log('登录表单初始化');
      log('loginForm:', loginForm);
      log('loginButton:', loginButton);
      log('usernameInput:', usernameInput);
      log('passwordInput:', passwordInput);
      log('errorMessage:', errorMessage);

      if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
          log('表单提交事件触发');
          e.preventDefault();
          
          const username = usernameInput.value;
          const password = passwordInput.value;
          
          log('登录请求:', { username, password });
          
          // 清空之前的错误信息
          errorMessage.style.display = 'none';
          errorMessage.textContent = '';
          
          // 模拟登录请求
          loginButton.disabled = true;
          loginButton.textContent = '登录中...';
          
          setTimeout(function() {
            log('验证账号和密码');
            // 验证账号和密码
            if (username === 'yex177' && password === '15673149779') {
              log('登录成功，准备跳转到dashboard.html');
              log('当前URL:', window.location.href);
              
              // 尝试使用不同的跳转方式
              const baseUrl = window.location.origin;
              const dashboardUrl = baseUrl + '/dashboard.html';
              log('跳转目标:', dashboardUrl);
              
              // 方法1：直接跳转
              log('尝试方法1：直接跳转');
              window.location.href = dashboardUrl;
              
              // 方法2：如果方法1失败，使用replace方法
              setTimeout(function() {
                log('方法1可能失败，尝试方法2：使用replace方法');
                window.location.replace(dashboardUrl);
              }, 1000);
            } else {
              log('登录失败，用户名或密码错误');
              // 显示错误提示
              errorMessage.textContent = '用户名或密码错误，请重新输入';
              errorMessage.style.display = 'block';
            }
            loginButton.disabled = false;
            loginButton.textContent = '登录';
          }, 1000);
        });
      } else {
        log('登录表单未找到');
      }
    });
  </script>
</body>
</html>
